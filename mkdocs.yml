site_name: Physics VN
site_description: Cơ sở dữ liệu Markdown về các khái niệm vật lý lớn và có ảnh hưởng từ sơ khai đến hiện đại.
site_url: https://brunotorilab.github.io/physics-vn/
repo_url: https://github.com/BrunoTorilab/physics-vn
repo_name: BrunoTorilab/physics-vn
edit_uri: edit/main/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: vi
  font:
    text: Noto Sans
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Chuyển sang giao diện tối
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Chuyển sang giao diện sáng
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search:
      lang: vi

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Trang chủ: index.md
  - Giới thiệu:
      - Tổng quan dự án: gioi-thieu.md
      - Timeline vật lý: timeline.md
      - Chỉ mục theo năm: index-by-year.md
      - Chỉ mục theo lĩnh vực: index-by-field.md
      - Hệ thẻ chủ đề: tags/README.md
  - Khái niệm:
      - Nền tảng cổ điển:
          - Nguyên tử luận cổ đại: concepts/01-nguyen-tu-luan-co-dai.md
          - Nhật tâm hệ Mặt Trời: concepts/02-nhat-tam-he-mat-troi.md
          - Cơ học cổ điển: concepts/03-co-hoc-co-dien.md
          - Hấp dẫn phổ quát: concepts/04-hap-dan-pho-quat.md
          - Nhiệt động lực học: concepts/05-nhiet-dong-luc-hoc.md
          - Cơ học thống kê: concepts/06-co-hoc-thong-ke.md
          - Điện từ học: concepts/07-dien-tu-hoc.md
          - Sóng điện từ: concepts/08-song-dien-tu.md
      - Cấu trúc vật chất và hạt nhân:
          - Cấu trúc nguyên tử: concepts/09-cau-truc-nguyen-tu.md
          - Phóng xạ: concepts/10-phong-xa.md
          - Phân hạch hạt nhân: concepts/11-phan-hach-hat-nhan.md
          - Vật lý bán dẫn: concepts/12-vat-ly-ban-dan.md
          - Siêu dẫn: concepts/13-sieu-dan.md
      - Cách mạng lượng tử và tương đối:
          - Lượng tử hóa năng lượng: concepts/14-luong-tu-hoa-nang-luong.md
          - Sóng-hạt lưỡng tính: concepts/15-song-hat-luong-tinh.md
          - Cơ học lượng tử: concepts/16-co-hoc-luong-tu.md
          - Nguyên lý bất định: concepts/17-nguyen-ly-bat-dinh.md
          - Thuyết tương đối hẹp: concepts/18-thuyet-tuong-doi-hep.md
          - Thuyết tương đối rộng: concepts/19-thuyet-tuong-doi-rong.md
          - Phản vật chất: concepts/20-phan-vat-chat.md
      - Vật lý hạt và trường hiện đại:
          - Mô hình quark và QCD: concepts/21-mo-hinh-quark-va-qcd.md
          - Mô hình chuẩn: concepts/22-mo-hinh-chuan.md
          - Cơ chế Higgs: concepts/23-co-che-higgs.md
          - Dao động neutrino: concepts/24-dao-dong-neutrino.md
      - Vật lý vũ trụ và vật thể cực đoan:
