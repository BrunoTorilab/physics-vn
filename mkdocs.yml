site_name: Physics VN
site_description: Co so du lieu Markdown ve cac khai niem vat ly lon va co anh huong tu so khai den hien dai.
site_url: https://brunotorilab.github.io/physics-vn/
repo_url: https://github.com/BrunoTorilab/physics-vn
repo_name: BrunoTorilab/physics-vn
edit_uri: edit/main/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: vi
  font:
    text: Noto Sans
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Chuyen sang giao dien toi
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Chuyen sang giao dien sang
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search:
      lang: vi

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Trang chu: index.md
  - Gioi thieu:
      - Tong quan du an: gioi-thieu.md
      - Timeline vat ly: timeline.md
      - Chi muc theo nam: index-by-year.md
      - Chi muc theo linh vuc: index-by-field.md
      - He the chu de: tags/README.md
  - Khai niem:
