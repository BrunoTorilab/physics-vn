          - Lý thuyết trường lượng tử: concepts/41-ly-thuyet-truong-luong-tu.md
          - Lý thuyết gauge: concepts/42-ly-thuyet-gauge.md
          - Thống nhất điện yếu: concepts/43-thong-nhat-dien-yeu.md
          - Phá vỡ đối xứng tự phát: concepts/44-pha-vo-doi-xung-tu-phat.md
          - Định lý Noether: concepts/45-dinh-ly-noether.md
          - Lạm phát vũ trụ: concepts/46-lam-phat-vu-tru.md
          - Lý thuyết hỗn loạn: concepts/47-ly-thuyet-hon-loan.md
          - Hiệu ứng Hall lượng tử: concepts/48-hieu-ung-hall-luong-tu.md
          - Từ điện trở khổng lồ: concepts/49-tu-dien-tro-khong-lo.md
          - Các pha tô pô của vật chất: concepts/50-cac-pha-to-po-cua-vat-chat.md
  - Tags:
      - Tổng quan hệ thẻ: tags/README.md
      - classical: tags/classical.md
      - thermodynamics: tags/thermodynamics.md
      - electromagnetism: tags/electromagnetism.md
      - quantum: tags/quantum.md
      - relativity: tags/relativity.md
      - nuclear: tags/nuclear.md
      - particle-physics: tags/particle-physics.md
      - condensed-matter: tags/condensed-matter.md
      - cosmology: tags/cosmology.md
      - astrophysics: tags/astrophysics.md
      - mathematical-foundations: tags/mathematical-foundations.md
      - technology: tags/technology.md
